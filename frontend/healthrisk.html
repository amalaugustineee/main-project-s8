<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Health Risk | Medical Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <div>
      <h1>Health Risk</h1>
      <p style="margin:0; opacity:0.7; font-size:0.9rem;">Lab Report Analysis</p>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="prescription.html">Prescription</a>
      <a href="healthrisk.html" class="active">Risk</a>
      <a href="diet.html">Diet</a>
      <a href="summary.html">Summary</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2 style="margin-bottom: 0.5rem;">Analyze Health Risk</h2>
      <p style="margin-bottom: 1.5rem;">Upload a lab report image or PDF to assess potential health risks.</p>
      <form id="formHealthRisk"
        style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-bottom: 2rem;">
        <input type="file" name="file" accept="image/*,.pdf" required style="flex-grow: 1; max-width: 400px;" />
        <button type="submit">Analyze</button>
      </form>
      <div class="panel" style="margin-bottom: 1.5rem;">
        <h3 style="margin-top: 0;">Risk Dashboard</h3>
        <canvas id="riskChart" height="200"></canvas>
      </div>
      <div id="viewHealthRisk" class="view hidden" style="margin-bottom: 1.5rem;"></div>
      <button id="btnSaveReport" class="hidden" style="margin-bottom: 1.5rem; background: var(--olive-dark);">Save
        Report to
        History</button>
      <pre id="outHealthRisk" class="output"></pre>
    </section>
  </main>

  <footer>
    <small>Tip: Run your API with <code>uvicorn test.app:app --reload</code></small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="app.js?v=6"></script>
</body>

</html>
