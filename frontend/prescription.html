<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prescription | Medical Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <div>
      <h1>Prescription Analysis</h1>
      <p style="margin:0; opacity:0.7; font-size:0.9rem;">Extract Medicines from Notes</p>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="prescription.html" class="active">Prescription</a>
      <a href="healthrisk.html">Risk</a>
      <a href="diet.html">Diet</a>
      <a href="summary.html">Summary</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Analyze Prescription</h2>
      <form id="formPrescription">
        <input type="file" name="file" accept="image/*,.pdf" required />
        <button type="submit">Analyze</button>
      </form>
      <div id="viewPrescription" class="view hidden"></div>
      <pre id="outPrescription" class="output"></pre>
    </section>
  </main>

  <footer>
    <small>Tip: Run your API with <code>uvicorn test.app:app --reload</code></small>
  </footer>

  <script src="app.js?v=6"></script>
</body>
