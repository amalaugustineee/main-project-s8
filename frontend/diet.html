<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diet Plan | Medical Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <div>
      <h1>Smart Diet Plan</h1>
      <p style="margin:0; opacity:0.7; font-size:0.9rem;">Personalized Nutrition</p>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="prescription.html">Prescription</a>
      <a href="healthrisk.html">Risk</a>
      <a href="diet.html" class="active">Diet</a>
      <a href="summary.html">Summary</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Generate Diet Plan</h2>
      <form id="formDiet">
        <div class="grid">
          <!-- Report file input removed (using DB history) -->
          <label>Region
            <input type="text" name="region" placeholder="South Indian" required />
          </label>
          <label>Cuisine Preference
            <input type="text" name="cuisine" placeholder="Vegetarian, Spicy..." />
          </label>
          <label>Condition (Optional)
            <input type="text" name="condition" placeholder="Leave empty to infer from history" />
          </label>
          <label>Allergies / Restrictions
            <input type="text" name="allergies" placeholder="Peanuts, Gluten..." />
          </label>
          <label>Weight (kg)
            <input type="number" step="0.1" name="weight" placeholder="70" required />
          </label>
          <label>Age
            <input type="number" name="age" placeholder="45" required />
          </label>
        </div>
        <button type="submit">Generate</button>
      </form>
      <div id="viewDiet" class="view hidden"></div>
      <pre id="outDiet" class="output"></pre>
    </section>
  </main>

  <footer>
    <small>Tip: Run your API with <code>uvicorn test.app:app --reload</code></small>
  </footer>

  <script src="app.js?v=6"></script>
</body>

</html>
